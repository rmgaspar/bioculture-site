		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<style>
			/* 1. LIMPEZA TOTAL */
			section, #header, .major, hr { border: none !important; box-shadow: none !important; }
			
			/* 2. MENU TOGGLE: FOLHA VERDE */
			#header .toggle {
				background: none !important;
				box-shadow: none !important;
				top: 2em !important; 
				left: 2em !important;
                border: none !important;
			}
			#header .toggle:before {
				content: '\f06c' !important; 
				font-family: "Font Awesome 5 Free";
				font-weight: 900;
				color: #2e7d32 !important;
				font-size: 1.6em !important;
			}
            #header .toggle:after { display: none !important; }

			/* 3. ALINHAMENTO AO TOPO */
			section { padding-top: 2.5em !important; }
            h1 { color: #2e7d32 !important; margin-bottom: 1.5em !important; font-size: 3em !important; }

			/* 4. GRELHA DOS 12 MESES */
			.month-grid { 
                display: grid; 
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
                gap: 1.5em; 
                margin-top: 2em; 
            }

			.month-card { 
                background: #fff; 
                border-radius: 25px; 
                overflow: hidden; 
                text-decoration: none !important; 
                transition: all 0.3s ease; 
                border: none !important;
                display: flex;
                flex-direction: column;
                box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            }

			.month-card:hover { 
                transform: translateY(-10px); 
                box-shadow: 0 10px 25px rgba(46, 125, 50, 0.15);
            }

			.month-card .image-container { 
                height: 160px; 
                overflow: hidden; 
            }

			.month-card img { 
                width: 100%; 
                height: 100%; 
                object-fit: cover; 
            }

			.month-card h3 { 
                text-align: center; 
                padding: 1.2em 0; 
                margin: 0; 
                color: #2e7d32 !important; 
                letter-spacing: 2px; 
                text-transform: uppercase; 
                font-size: 0.85em; 
                font-weight: 700;
            }

			/* 5. ASSINATURA FINAL À DIREITA */
			.footer-signature-right { 
                text-align: right; 
                padding: 6em 0 2em 0; 
                opacity: 0.9; 
            }
		</style>
	</head>
