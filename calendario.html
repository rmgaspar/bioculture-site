		<link rel="stylesheet" href="assets/css/main.css" />
		<style>
			/* 1. LIMPEZA TOTAL */
			section, #header, .major, hr { border: none !important; box-shadow: none !important; }
			
			/* 2. MENU TOGGLE: FOLHA VERDE */
			#header .toggle {
				background: none !important;
				box-shadow: none !important;
				top: 2em !important; 
				left: 2em !important;
                border: none !important;
			}
			#header .toggle:before {
				content: '\f06c' !important; 
				font-family: "Font Awesome 5 Free";
				font-weight: 900;
				color: #2e7d32 !important;
				font-size: 1.6em !important;
			}
            #header .toggle:after { display: none !important; }

			/* 3. ALINHAMENTO AO TOPO */
			section { padding-top: 2.5em !important; }
            h1 { color: #2e7d32 !important; margin-bottom: 1em !important; font-size: 3em !important; }

			/* 4. GRELHA DOS 12 MESES (ESTILO MINIMALISTA) */
			.month-grid { 
                display: grid; 
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
                gap: 1.5em; 
                margin-top: 2em; 
            }

			.month-card { 
                position: relative;
                background: #fff; 
                border-radius: 25px; 
                overflow: hidden; 
                text-decoration: none !important; 
                transition: all 0.3s ease; 
                border: none !important;
                height: 200px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            }

			.month-card:hover { 
                transform: translateY(-8px); 
                box-shadow: 0 12px 25px rgba(46, 125, 50, 0.2);
            }

			.month-card img { 
                width: 100%; 
                height: 100%; 
                object-fit: cover; 
                transition: filter 0.3s ease;
            }

            .month-card:hover img {
                filter: brightness(0.8);
            }

            /* Nome do mês subtil sobre a imagem */
			.month-card h3 { 
                position: absolute;
                bottom: 15px;
                left: 0;
                right: 0;
                text-align: center; 
                margin: 0; 
                color: #ffffff !important; 
                letter-spacing: 4px; 
                text-transform: uppercase; 
                font-size: 0.75em; 
                font-weight: 700;
                text-shadow: 0 2px 4px rgba(0,0,0,0.5); /* Garante visibilidade */
                pointer-events: none;
            }

			/* 5. ASSINATURA FINAL À DIREITA */
			.footer-signature-right { 
                text-align: right; 
                padding: 6em 0 2em 0; 
                opacity: 0.9; 
            }
		</style>
	</head>
