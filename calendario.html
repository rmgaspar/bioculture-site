		<link rel="stylesheet" href="assets/css/main.css" />
		<style>
			/* 1. LIMPEZA TOTAL E ALINHAMENTO AO TOPO */
			section, #header, .major, hr, article { border: none !important; box-shadow: none !important; }
			
			#header .toggle {
				background: none !important;
				box-shadow: none !important;
				top: 2em !important; 
				left: 2em !important;
                border: none !important;
			}
			#header .toggle:before {
				content: '\f06c' !important; 
				font-family: "Font Awesome 5 Free";
				font-weight: 900;
				color: #2e7d32 !important;
				font-size: 1.6em !important;
			}
            #header .toggle:after { display: none !important; }

			/* Margem idêntica à da sidebar para o título */
			section { padding-top: 2.5em !important; }
            h1 { color: #2e7d32 !important; margin-bottom: 1.2em !important; font-size: 3em !important; letter-spacing: -1px; }

			/* 2. GRELHA DOS 12 MESES (ESTILO GALERIA) */
			.month-grid { 
                display: grid; 
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
                gap: 1.5em; 
                margin-top: 0; 
            }

			.month-card { 
                position: relative !important;
                background: #f4f4f4; 
                border-radius: 20px !important; 
                overflow: hidden !important; 
                text-decoration: none !important; 
                transition: transform 0.3s ease, box-shadow 0.3s ease; 
                height: 240px !important;
                display: block !important;
                border: none !important;
            }

			.month-card:hover { 
                transform: translateY(-8px); 
                box-shadow: 0 15px 30px rgba(46, 125, 50, 0.2) !important;
            }

			.month-card img { 
                width: 100%; 
                height: 100%; 
                object-fit: cover; 
                display: block;
                transition: filter 0.4s ease;
            }

            /* Overlay escuro subtil para o texto ler-se melhor */
            .month-card::after {
                content: '';
                position: absolute;
                bottom: 0; left: 0; right: 0;
                height: 40%;
                background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
                transition: opacity 0.3s ease;
            }

            .month-card:hover img { filter: brightness(0.8); }

            /* Nome do mês minimalista sobre a imagem */
			.month-card h3 { 
                position: absolute !important;
                bottom: 20px !important;
                left: 0;
                right: 0;
                text-align: center !important; 
                margin: 0 !important; 
                color: #ffffff !important; 
                letter-spacing: 3px !important; 
                text-transform: uppercase !important; 
                font-size: 0.85em !important; 
                font-weight: 700 !important;
                z-index: 10;
                pointer-events: none;
            }

			/* 3. ASSINATURA bioCULTURA */
			.footer-signature-right { 
                text-align: right; 
                padding: 6em 0 2em 0; 
                opacity: 0.9; 
            }
		</style>
	</head>
