<html>
	<head>
		<title>bioCultura - Calendário Hortícola</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<style>
			/* 1. LIMPEZA TOTAL E AJUSTE MOBILE */
			section, .major, hr, article { border: none !important; box-shadow: none !important; }
			
			#header {
                border: none !important;
                background: transparent !important;
                height: 3.5em !important; /* Espaço para o botão no telemóvel */
                margin: 0 !important;
                padding: 0 !important;
                display: flex !important;
                align-items: center;
            }

			#header .toggle {
				background: none !important;
				top: 2em !important; 
				left: 2em !important;
                border: none !important;
                display: block !important;
                visibility: visible !important;
                text-decoration: none !important;
			}
			#header .toggle:before {
				content: '\f06c' !important; 
				font-family: "Font Awesome 5 Free";
				font-weight: 900;
				color: #2e7d32 !important;
				font-size: 1.5em;
			}
            #header .toggle:after { display: none !important; }

			/* 2. ALINHAMENTO AO TOPO (IDENTADO COM SIDEBAR) */
			section { padding-top: 2.5em !important; }
            h1 { color: #2e7d32 !important; margin-bottom: 1.2em !important; font-size: 3em !important; }

			/* 3. GRELHA DOS 12 MESES (ESTILO GALERIA) */
			.month-grid { 
                display: grid; 
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
                gap: 1.5em; 
                margin-top: 2em; 
            }

			.month-card { 
                position: relative;
                background: #f4f4f4; 
                border-radius: 25px; 
                overflow: hidden; 
                text-decoration: none !important; 
                transition: transform 0.3s ease; 
                height: 240px;
                display: block;
                border: none !important;
                box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            }

			.month-card:hover { 
                transform: translateY(-8px); 
                box-shadow: 0 12px 25px rgba(46, 125, 50, 0.2);
            }

			.month-card img { width: 100%; height: 100%; object-fit: cover; transition: filter 0.3s ease; }
            .month-card:hover img { filter: brightness(0.8); }

            /* Overlay para leitura do nome do mês */
            .month-card::after {
                content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40%;
                background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
            }

			.month-card h3 { 
                position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; 
                color: #ffffff !important; letter-spacing: 4px; text-transform: uppercase; 
                font-size: 0.8em; font-weight: 700; z-index: 10; pointer-events: none;
                text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            }
		</style>
	</head>
	<body class="is-preload">
		<div id="wrapper">
			<div id="main">
				<div class="inner">

					<header id="header">
                        <!-- O botão toggle é injetado aqui pelo main.js -->
                    </header>

					<section>
						<header class="main">
							<h1>Calendário Hortícola</h1>
						</header>

						<div class="month-grid">
                            <!-- Links apontando para a pasta 'calendario/' -->
							<a href="calendario/janeiro.html" class="month-card"><img src="https://images.unsplash.com/photo-1542840843-331d9f27ad6c?w=600" /><h3>Janeiro</h3></a>
							<a href="calendario/fevereiro.html" class="month-card"><img src="https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?w=600" /><h3>Fevereiro</h3></a>
							<a href="calendario/marco.html" class="month-card"><img src="https://images.unsplash.com/photo-1466692476868-aef1dfb1e735?w=600" /><h3>Março</h3></a>
							<a href="calendario/abril.html" class="month-card"><img src="https://images.unsplash.com/photo-1560493676-04071c5f467b?w=600" /><h3>Abril</h3></a>
							<a href="calendario/maio.html" class="month-card"><img src="https://images.unsplash.com/photo-1464226184884-fa280b87c399?w=600" /><h3>Maio</h3></a>
							<a href="calendario/junho.html" class="month-card"><img src="https://images.unsplash.com/photo-1589923188900-85dae523342b?w=600" /><h3>Junho</h3></a>
							<a href="calendario/julho.html" class="month-card"><img src="https://images.unsplash.com/photo-1471193945509-9ad0617afabf?w=600" /><h3>Julho</h3></a>
							<a href="calendario/agosto.html" class="month-card"><img src="https://images.unsplash.com/photo-1753172433718-d0c2a99443d8?w=600" /><h3>Agosto</h3></a>
							<a href="calendario/setembro.html" class="month-card"><img src="https://images.unsplash.com/photo-1500651230702-0e2d8a49d4ad?w=600" /><h3>Setembro</h3></a>
							<a href="calendario/outubro.html" class="month-card"><img src="https://images.unsplash.com/photo-1508739773434-c26b3d09e071?w=600" /><h3>Outubro</h3></a>
							<a href="calendario/novembro.html" class="month-card"><img src="https://images.unsplash.com/photo-1509316975850-ff9c5deb0cd9?w=600" /><h3>Novembro</h3></a>
							<a href="calendario/dezembro.html" class="month-card"><img src="https://images.unsplash.com/photo-1416870262648-25133b188555?w=600" /><h3>Dezembro</h3></a>
						</div>
					</section>

				</div>
			</div>
			<div id="sidebar"></div>
		</div>

		<script src="assets/js/jquery.min.js"></script>
        <script src="assets/js/browser.min.js"></script>
        <script src="assets/js/breakpoints.min.js"></script>
        <script src="assets/js/util.js"></script>
        <script>
            fetch('sidebar-content.html').then(response => response.text()).then(data => {
                document.getElementById('sidebar').innerHTML = data;
                var script = document.createElement('script');
                script.src = 'assets/js/main.js';
                document.body.appendChild(script);
            });
        </script>
	</body>
</html>
