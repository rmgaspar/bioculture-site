		<style>
			/* 1. LIMPEZA DE LINHAS E BORDAS */
			section, #header, .major, hr, article { border: none !important; box-shadow: none !important; }
			
			/* 2. AJUSTE DO HEADER PARA MOBILE E PC */
			#header {
                border: none !important;
                background: transparent !important;
                height: 3.5em !important; /* Espaço para o botão no telemóvel */
                margin: 0 !important;
                padding: 0 !important;
                display: flex !important;
                align-items: center;
            }

			/* Botão do Menu (Folha Verde) */
			#header .toggle {
				background: none !important;
				top: 2em !important; 
				left: 2em !important;
                border: none !important;
                display: block !important;
                visibility: visible !important;
                text-decoration: none !important;
                z-index: 10001;
			}
			#header .toggle:before {
				content: '\f06c' !important; 
				font-family: "Font Awesome 5 Free";
				font-weight: 900;
				color: #2e7d32 !important;
				font-size: 1.5em;
			}
            #header .toggle:after { display: none !important; }

			/* Alinhamento do Título ao topo (Identado com Sidebar no PC) */
			section { padding-top: 2.5em !important; }
            h1 { color: #2e7d32 !important; margin-bottom: 1.5em !important; font-size: 3em !important; letter-spacing: -1px; }

			/* 3. GRELHA DOS 12 MESES (ESTILO GALERIA) */
			.month-grid { 
                display: grid; 
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
                gap: 1.5em; 
                margin-top: 0; 
            }

			.month-card { 
                position: relative !important;
                background: #f4f4f4; 
                border-radius: 25px !important; 
                overflow: hidden !important; 
                text-decoration: none !important; 
                transition: transform 0.3s ease, box-shadow 0.3s ease; 
                height: 240px !important;
                display: block !important;
                border: none !important;
                box-shadow: 0 4px 15px rgba(0,0,0,0.08) !important;
            }

			.month-card:hover { 
                transform: translateY(-8px); 
                box-shadow: 0 15px 30px rgba(46, 125, 50, 0.2) !important;
            }

			.month-card img { 
                width: 100%; 
                height: 100%; 
                object-fit: cover; 
                display: block;
                transition: filter 0.4s ease;
            }

            /* Overlay escuro subtil para o texto ler-se melhor */
            .month-card::after {
                content: '';
                position: absolute;
                bottom: 0; left: 0; right: 0;
                height: 45%;
                background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
                transition: opacity 0.3s ease;
            }

            .month-card:hover img { filter: brightness(0.8); }

            /* Nome do mês minimalista sobre a imagem */
			.month-card h3 { 
                position: absolute !important;
                bottom: 20px !important;
                left: 0;
                right: 0;
                text-align: center !important; 
                margin: 0 !important; 
                color: #ffffff !important; 
                letter-spacing: 4px !important; 
                text-transform: uppercase !important; 
                font-size: 0.85em !important; 
                font-weight: 700 !important;
                z-index: 10;
                pointer-events: none;
                text-shadow: 0 2px 4px rgba(0,0,0,0.5) !important;
            }
		</style>
