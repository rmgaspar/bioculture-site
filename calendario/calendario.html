<!DOCTYPE HTML>
<html>
	<head>
		<title>bioCultura - Calendário Hortícola</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<style>
			/* 1. LIMPEZA DE LINHAS */
			#header, .major, hr, section { border: none !important; box-shadow: none !important; }
			
            /* 2. AJUSTE DO BOTÃO PARA TELEMÓVEL */
            #header {
                height: 3.5em !important;
                display: flex !important;
                align-items: center;
                background: transparent !important;
            }
			#header .toggle {
				background: none !important;
				top: 1.5em !important; 
				left: 1.5em !important;
                text-decoration: none !important;
			}
			#header .toggle:before {
				content: '\f06c' !important; 
				font-family: "Font Awesome 5 Free";
				font-weight: 900;
				color: #2e7d32 !important;
				font-size: 1.5em;
			}
            #header .toggle:after { display: none !important; }

			/* 3. ALINHAMENTO DO CONTEÚDO NO PC */
			#main > .inner { padding-top: 2.5em !important; }
            h1 { color: #2e7d32 !important; margin-bottom: 1.2em !important; font-size: 3em !important; }

			/* 4. GRELHA DE MESES */
			.month-grid { 
                display: grid; 
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
                gap: 1.5em; 
            }
			.month-card { 
                position: relative; background: #f4f4f4; border-radius: 20px; 
                overflow: hidden; text-decoration: none !important; 
                transition: transform 0.3s ease; height: 240px; display: block;
            }
			.month-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(46, 125, 50, 0.2); }
			.month-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
            .month-card::after {
                content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
                background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            }
			.month-card h3 { 
                position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; 
                color: #ffffff !important; letter-spacing: 3px; text-transform: uppercase; 
                font-size: 0.85em; font-weight: 700; z-index: 10; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            }
		</style>
	</head>
	<body class="is-preload">
		<div id="wrapper">
			<div id="main">
				<div class="inner">
					<header id="header"></header>
					<section>
						<h1>Calendário Hortícola</h1>
						<div class="month-grid">
							<a href="calendario/01-janeiro.html" class="month-card"><img src="https://images.unsplash.com/photo-1542840843-331d9f27ad6c?w=600" /><h3>Janeiro</h3></a>
							<a href="calendario/02-fevereiro.html" class="month-card"><img src="https://images.unsplash.com/photo-1523348837708-15d4a09cfac2?w=600" /><h3>Fevereiro</h3></a>
							<a href="calendario/03-marco.html" class="month-card"><img src="https://images.unsplash.com/photo-1466692476868-aef1dfb1e735?w=600" /><h3>Março</h3></a>
							<a href="calendario/04-abril.html" class="month-card"><img src="https://images.unsplash.com/photo-1560493676-04071c5f467b?w=600" /><h3>Abril</h3></a>
							<a href="calendario/05-maio.html" class="month-card"><img src="https://images.unsplash.com/photo-1464226184884-fa280b87c399?w=600" /><h3>Maio</h3></a>
							<a href="calendario/06-junho.html" class="month-card"><img src="https://images.unsplash.com/photo-1589923188900-85dae523342b?w=600" /><h3>Junho</h3></a>
							<a href="calendario/07-julho.html" class="month-card"><img src="https://images.unsplash.com/photo-1471193945509-9ad0617afabf?w=600" /><h3>Julho</h3></a>
							<a href="calendario/08-agosto.html" class="month-card"><img src="https://images.unsplash.com/photo-1753172433718-d0c2a99443d8?w=600" /><h3>Agosto</h3></a>
							<a href="calendario/09-setembro.html" class="month-card"><img src="https://images.unsplash.com/photo-1500651230702-0e2d8a49d4ad?w=600" /><h3>Setembro</h3></a>
							<a href="calendario/10-outubro.html" class="month-card"><img src="https://images.unsplash.com/photo-1508739773434-c26b3d09e071?w=600" /><h3>Outubro</h3></a>
							<a href="calendario/11-novembro.html" class="month-card"><img src="https://images.unsplash.com/photo-1509316975850-ff9c5deb0cd9?w=600" /><h3>Novembro</h3></a>
							<a href="calendario/12-dezembro.html" class="month-card"><img src="https://images.unsplash.com/photo-1416870262648-25133b188555?w=600" /><h3>Dezembro</h3></a>
						</div>
					</section>
				</div>
			</div>
			<div id="sidebar"></div>
		</div>

		<script src="assets/js/jquery.min.js"></script>
        <script src="assets/js/browser.min.js"></script>
        <script src="assets/js/breakpoints.min.js"></script>
        <script src="assets/js/util.js"></script>
        <script>
            fetch('sidebar-content.html').then(response => response.text()).then(data => {
                document.getElementById('sidebar').innerHTML = data;
                var script = document.createElement('script');
                script.src = 'assets/js/main.js';
                document.body.appendChild(script);
            });
        </script>
	</body>
</html>
